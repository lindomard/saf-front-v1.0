<div class="example-container mat-elevation-z8">

  <table mat-table [dataSource]="dataSource" [class.isMobile]="isMobile">
    <!-- Position Column -->
    <ng-container matColumnDef="cpId">
      <th mat-header-cell *matHeaderCellDef class="truncate-cell">Chave Id</th>
      <td mat-cell *matCellDef="let element" class="truncate-cell">
        <span class="mobile-label">Chave Mobile:</span>
        {{element.cpId}}
      </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="cpDatHorIni">
      <th mat-header-cell *matHeaderCellDef class="truncate-cell">Iniciado</th>
      <td mat-cell *matCellDef="let element" class="truncate-cell">
        <span class="mobile-label">Iniciado:</span>
        {{ fRetornaFormatado(element.cpDatHorIni, "datetime") }}
      </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="cpDatHorTermino">
      <th mat-header-cell *matHeaderCellDef class="truncate-cell">Terminado</th>
      <td mat-cell *matCellDef="let element" class="truncate-cell">
        <span class="mobile-label">Terminado:</span>

        {{ fRetornaFormatado(element.cpDatHorTermino, "datetime") }}

    </ng-container>

    <!-- Symbol Column -->
    <ng-container matColumnDef="cpNome">
      <th mat-header-cell *matHeaderCellDef class="truncate-cell">Processo</th>
      <td mat-cell *matCellDef="let element" class="truncate-cell">
        <span class="mobile-label">Nome Processo:</span>
        {{element.cpNome}}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
