<loadingV01 *ngIf="isLoading">{{ isLoading }}</loadingV01>

<mat-card>

    <h1 mat-dialog-title cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle
        style="background-color: rgb(21, 100, 19); text-align:center;"> {{ tipoEvento }}

        <div class="row">



            <div class="col text-right">
                <button class="btn btn-primary mr-2" (click)="cancelarESair()">Fechar</button>
            </div>

        </div>

    </h1>



    <mat-card-content>
        <form [formGroup]="form">
            <div class="row">

                <div class="col-xl-3">
                    <label>Chave Id do Banco de Dados 01:</label>
                    <input id="idTab01" formControlName="idTab01" class="form-control" type="number">

                </div>

                <div class="col-xl-3">
                    <label>Chave Id do Banco de Dados 01:</label>
                    <input id="idTab02" formControlName="idTab02" class="form-control" type="number">


                </div>
                <div class="col-xl-3">
                    <br>


                    <div class="col text-right">
                        <button class="btn btn-primary mr-3" (click)="fComparar()">Comparar Agora</button>
                    </div>
                </div>



            </div>



        </form>
    </mat-card-content>
    <mat-card-actions>
        <button mat-button color="warn" (click)="fComparar()">Remover</button>
    </mat-card-actions>

</mat-card>
