<div class="container">

  <loadingV01 *ngIf="isLoading">{{ isLoading }}</loadingV01>
  <h1 mat-dialog-title cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle
    style="background-color: rgb(28, 119, 161); text-align:center;"> {{ mTipoOperacao }}</h1>


  <mat-toolbar color="warn" class="child">

    <div class="col">
      <div class="row">



        <span> {{ mTipoOperacao }} </span>
        <!-- <span class="spacer"></span> -->


        <div class="col text-right">
          <button class="btn btn-dark" (click)="cancelarESair()">Cancelar/Sair</button>
        </div>

      </div>

    </div>
  </mat-toolbar>


  <br>
  <br>

  <br>
  <br>



  <div class="main">
    <mat-card>
      <br>
      <br>

      <mat-card-content>
        <form [formGroup]="form">
          <div class="row">
            <div class="fileUpload btn btn-primary">
              <span>Anexar <i class="fa fa-paperclip"></i></span>
              <input (change)="selecFiles($event)" type="file" class="upload" multiple formControlName="files" />
            </div>
          </div>
          <div class="row">
            <mat-list>
              <mat-list-item *ngFor="let item of files">
                <mat-icon matListIcon>folder</mat-icon>
                <p matLine>
                  <span> {{ item.name }} </span>
                </p>
              </mat-list-item>
            </mat-list>
          </div>
        </form>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="warn" (click)="removerFiles()">Remover</button>
        <button mat-button [disabled]="mEstaProcessando" (click)="uploadFile()">Enviar</button>
      </mat-card-actions>

      <mat-card-actions>
        <div class="row">
          <div class="col-md-12">
            <mat-progress-bar *ngIf="uploadResponse.message > 0" mode="determinate"
              value="{{ uploadResponse.message }}"></mat-progress-bar>
          </div>
          <div class="col-md-12">

            <span *ngIf="uploadResponse.message > 0">Percentual {{ uploadResponse.message }} % {{ this.mObsTempo }}
            </span>
          </div>
        </div>

      </mat-card-actions>



    </mat-card>
  </div>
  <br>
</div>
