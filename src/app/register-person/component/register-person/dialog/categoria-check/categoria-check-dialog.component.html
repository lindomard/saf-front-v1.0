<app-dialog-body (handlerClick)="onClick()" [title]="title">
    <div class="form-build">
        <app-form-build #instanceForm [fieldsConfig]="fields"></app-form-build>
      </div>
    
      <app-table-list #instanceTable
        [itens]="itemsTable"
        [displayColumns]="displayColumns"
        [data]="data?.categorias"
        [isPaginator]="false"
        (handlerSelected)="selected($event)"
      ></app-table-list>
</app-dialog-body>
