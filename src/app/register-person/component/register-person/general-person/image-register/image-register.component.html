<mat-card class="main">
    <app-form-build #instanceForm [fieldsConfig]="fields"></app-form-build>


    
    <form [formGroup]="form">
        <div class="wrapper-box">
            <div class="wrapper">
                <div class="icon-wrapper">
                    <!-- <input #fileInput type="file" [id]="idInput" class="inputfile" (change)="fileBrowseHandler($event.target.files)" /> -->
                    <input #fileInput type="file" class="inputfile" (change)="fileBrowseHandler($event.target.files)" />

                    <!-- <label [for]="idInput"> -->
                        <label>
                            <img class="center-icon" src="assets/image/add_file.png" alt="AgentFire Logo" height="80">
                    </label>
                </div>
                {{ path }}
            </div>
        </div>
    </form>

    <mat-table #table [dataSource]="dataSource" [ngStyle]="getStyleShowTable()">

        <ng-container matColumnDef="docType">
            <mat-header-cell *matHeaderCellDef> Tido de Documento </mat-header-cell>
            <mat-cell class="truncate-cell" *matCellDef="let element"> {{ element.idDocType | optionTransform:options }} </mat-cell>
        </ng-container>


        <ng-container matColumnDef="name">
            <mat-header-cell *matHeaderCellDef> Nome do Arquivo </mat-header-cell>
            <mat-cell class="truncate-cell " *matCellDef="let element"> {{element?.name}} </mat-cell>
        </ng-container>

        <ng-container matColumnDef="dueDate">
            <mat-header-cell *matHeaderCellDef> Data de Vencimento </mat-header-cell>
            <mat-cell class="truncate-cell" *matCellDef="let element"> {{ element.dueDate | date }} </mat-cell>
        </ng-container>

        <ng-container matColumnDef="obs">
            <mat-header-cell *matHeaderCellDef> Obeservação </mat-header-cell>
            <mat-cell class="truncate-cell" *matCellDef="let element"> {{element.obs}} </mat-cell>
        </ng-container>

        <ng-container matColumnDef="file">
            <mat-header-cell *matHeaderCellDef> ... </mat-header-cell>
            <mat-cell class="truncate-cell" *matCellDef="let element">
                <span>
                    <video [src]="element.url" *ngIf="element.format==='video' && element.url" height="100" width="100%"
                        controls></video>
                    <img [src]="element.url" *ngIf="element.format==='image' && element.url" height="100" width="100%"
                        alt="AgentFire Logo">

                        <div class="file-icon" style="width: 50px" *ngIf="element.format==='icon'"  height="100">
                            <svg version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg"
                                xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 58 58"
                                style="enable-background:new 0 0 58 58;" xml:space="preserve">
                                <polygon style="fill:#EDEADA;" points="51.5,14 37.5,0 6.5,0 6.5,58 51.5,58 " />
                                <g>
                                    <path style="fill:#CEC9AE;"
                                        d="M16.5,23h25c0.552,0,1-0.447,1-1s-0.448-1-1-1h-25c-0.552,0-1,0.447-1,1S15.948,23,16.5,23z" />
                                    <path style="fill:#CEC9AE;"
                                        d="M16.5,15h10c0.552,0,1-0.447,1-1s-0.448-1-1-1h-10c-0.552,0-1,0.447-1,1S15.948,15,16.5,15z" />
                                    <path style="fill:#CEC9AE;"
                                        d="M41.5,29h-25c-0.552,0-1,0.447-1,1s0.448,1,1,1h25c0.552,0,1-0.447,1-1S42.052,29,41.5,29z" />
                                    <path style="fill:#CEC9AE;"
                                        d="M41.5,37h-25c-0.552,0-1,0.447-1,1s0.448,1,1,1h25c0.552,0,1-0.447,1-1S42.052,37,41.5,37z" />
                                    <path style="fill:#CEC9AE;"
                                        d="M41.5,45h-25c-0.552,0-1,0.447-1,1s0.448,1,1,1h25c0.552,0,1-0.447,1-1S42.052,45,41.5,45z" />
                                </g>
                                <polygon style="fill:#CEC9AE;" points="37.5,0 37.5,14 51.5,14 " />
                            </svg>
                        </div>
                </span>
            </mat-cell>
        </ng-container>

        <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;" (click)="clickando(row)" ></mat-row>

    </mat-table>

</mat-card>
