<h6 style="color: black">Ordem dos Resultados</h6>


<div style="height: 210px; overflow: auto;">
    <table mat-table #tableCamposFiltros [dataSource]="dataSourceOrdem" class="mat-elevation-z8" cdkDropList
        [cdkDropListData]="dataSourceOrdem" (cdkDropListDropped)="dropTableIndicesCampos($event)">


        <ng-container matColumnDef="existe">
            <th mat-header-cell *matHeaderCellDef> Indice </th>
            <td mat-cell *matCellDef="let element ">
                <mat-checkbox [(ngModel)]="element.existe"
                (change)="clickCamposDaTabela()"
                ></mat-checkbox>
            </td>
        </ng-container>


        <ng-container matColumnDef="position">
            <th mat-header-cell *matHeaderCellDef> Ordem </th>
            <td mat-cell *matCellDef="let element , index as i ">
                {{i+1}}
            </td>
        </ng-container>

        <ng-container matColumnDef="descricao">
            <th mat-header-cell *matHeaderCellDef> Campo </th>
            <td mat-cell *matCellDef="let element"> {{element.descricao}} </td>
        </ng-container>


        <ng-container matColumnDef="decrescente">
            <th mat-header-cell *matHeaderCellDef> decrescente </th>
            <td mat-cell *matCellDef="let element ">
                <mat-checkbox [(ngModel)]="element.decrescente"
                (change)="clickCamposDaTabela()"
                ></mat-checkbox>
            </td>
        </ng-container>


        

        <tr mat-header-row *matHeaderRowDef="displayColumnsCamposIndices"></tr>
        <tr mat-row *matRowDef="let row; columns: displayColumnsCamposIndices;" cdkDrag [cdkDragData]="row">
        </tr>
    </table>
</div>
