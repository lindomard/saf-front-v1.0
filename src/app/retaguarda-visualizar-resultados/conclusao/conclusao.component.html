<loadingV01 *ngIf="isLoading">{{ isLoading }}</loadingV01>




<mat-card>
    <h1 mat-dialog-title cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle
        style="background-color: rgb(28, 119, 161); text-align:center;"> Conclusão </h1>
    <h1 mat-dialog-title cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle
        style="background-color: rgb(21, 100, 19); text-align:center;"> {{ tipoEvento }}


        <div class="col text-right">
            <button class="btn btn-primary mr-2" (click)="cancelarESair()">Fechar</button>
        </div>


    </h1>

</mat-card>


<mat-card class="example-card">

    <div class="row">
        <div class="col-xl-12">
            <div class="row">


                <div class="col-md-12">
                    <app-consultas-e-relatorios #instanceConsultasERelatorios
                        (fAtualizaAtualizarPor)="fAtualizarBusca2($event)" [mDisableGerar]="mDisableGerar"
                        [dataSourcecamposParaFiltrosList]="dataSourcecamposParaFiltrosList"
                        [dataSourceTableFilpadCab]="dataSourceTableFilpadCab" [camposConsultaPor]="camposConsultaPor"
                        (fGerarPdf)="baixarRelatorio()" (fGerarPlanilha)="fBuscarPlanilha()"
                        (fSalvarRelatorioPadrao)="fBuscarPlanilha()"
                        (fAtualizarDadosTabelaFiltros)="fAtualizarBusca2($event)"
                        (resetarConfiguracoesEmit)="resetarConfiguracoes()"
                        (fAjustarDisplayColumnsTableEmit)="fAjustarDisplayColumnsTable()"></app-consultas-e-relatorios>
                </div>




            </div>
        </div>
    </div>
</mat-card>



<mat-card class="main">


    <hr>
    <div class="feed">
        <div class="row">
            <div class="col-xl-12">
                <form [formGroup]="formulario">
                    <div class="row">
                        <div class="col-md-6">
                            <label>Descrição:</label>
                            <input id="r0200DescrItem" formControlName="r0200DescrItem" class="form-control"
                                type="text">

                        </div>
                        <div class="col-md-3">
                            <label>Cód Item</label>
                            <input formControlName="rc170CodItem" class="form-control" type="text">
                        </div>



                        <div class="col-md-3">
                            <label>Ano:</label>
                            <input formControlName="ano" type="number" class="form-control">
                        </div>



                        <div class="col-md-3">
                            <button c-button class="form-control" (click)="fBuscarTabelaBase()">Atualizar
                                informações</button>

                        </div>


                        <div class="col-md-3">
                            <button c-button class="form-control" (click)="fBuscarPlanilha()">
                                Baixar Planilha</button>

                        </div>

                        <div class="col-md-3">
                            <button c-button class="form-control" (click)="baixarRelatorio()">
                                Baixar Relatorio</button>

                        </div>

                        <div class="col-md-3">
                            <button c-button class="form-control" (click)="cancelarESair()">
                                Fechar Janela</button>

                        </div>
                        <div class="col-md-2">
                            <div class="tipoOmissao">

                                <label>
                                    <input type="checkbox" [checked]="opcao === '0'" (change)="marcar('0')">
                                    0 - Todas As Omissões

                                </label>
                            </div>
                        </div>




                        <div class="col-md-3">

                            <div class="tipoOmissao">
                                <label>
                                    <input type="checkbox" [checked]="opcao === '1'" (change)="marcar('1')">
                                    1 - Omissao Entrada
                                </label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="tipoOmissao">

                                <label>
                                    <input type="checkbox" [checked]="opcao === '2'" (change)="marcar('2')">
                                    2 - Omissão de Saida

                                </label>
                            </div>
                        </div>


                        
                        <div class="col-md-2">
                            <div class="tipoOmissao">
                                <label>
                                    <input type="checkbox" [checked]="opcao === '3'" (change)="marcar('3')">
                                    3 - Sem Omissão
                                </label>
                            </div>
                        </div>

                        <div class="col-md-2">
                            <div class="tipoOmissao">
                                <label>
                                    <input type="checkbox" [checked]="opcao === '4'" (change)="marcar('4')">
                                    4 - Tudo
                                </label>
                            </div>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>

</mat-card>





<table mat-table #demomatdatatable [dataSource]="dataSourceWithPageSize" class="mat-elevation-z8">
    <ng-container [matColumnDef]="column" *ngFor="let column of displayedColumns">
        <th mat-header-cell [style]="getAlingn(column)" [width]="getStyle3(column)" *matHeaderCellDef>
            {{ getColumnName(column) }} </th>



        <div *ngIf="column!=='Visualizar'">


            <td mat-cell [style]="getAlingn(column)" [width]="getStyle3(column)"
                (dblclick)="onDblClick(element,column )" *matCellDef="let element">
                {{ fValorENomeDoCampoParaformatar(element,column) }}


            </td>
        </div>



    </ng-container>






    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row #demmatrow *matRowDef="let row; columns: displayedColumns;" [matRowKeyboardSelection]="selection"
        [rowModel]="row" [matTable]="demomatdatatable" [page]="filterPaginator" [row]="demmatrow"
        (paginaProxima)="paginaProxima()" (paginaAnterior)="paginaAnterior()" (paginaUltima)="paginaUltima()"
        (paginaPrimeira)="paginaPrimeira()" [ngClass]="{selected: selection.isSelected(row)}"></tr>



</table>

<mat-paginator #paginatorPageSize [pageSize]="filterPaginator.size" [length]="filterPaginator.totalElements"
    [pageIndex]="filterPaginator.page" [pageSizeOptions]="pageLimitOptions" showFirstLastButtons (page)="changeEvent()">
</mat-paginator>
