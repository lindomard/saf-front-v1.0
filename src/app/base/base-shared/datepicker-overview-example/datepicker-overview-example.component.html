<mat-form-field>
    <!-- <input type="hidden" [matDatepicker]="picker" [(ngModel)]='value' > -->
    <input matInput [textMask]="mask" [ngModel]="value | date:'dd/MM/yyyy'" (blur)="onBlur()"
    placeholder="{{ placeholder2 }}"
     (change)='todate($event.target.value)'>
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker (selectedChanged)="onChange($event)" #picker></mat-datepicker>
</mat-form-field>
